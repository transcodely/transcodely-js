name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  PNPM_VERSION: "10"

jobs:
  build:
    name: Typecheck, Test, Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify build artifacts
        run: |
          test -f dist/index.mjs
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts

  ci:
    name: Typecheck, Test, Build
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more Node matrix legs failed: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All Node matrix legs passed."
