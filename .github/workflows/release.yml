name: Release

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================================================
  # Release Please — opens / updates the release PR, tags + creates a Release
  # when the PR is merged.
  # ============================================================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Publish to npm — runs only when release-please created a tag + Release
  # in the previous job. Re-runs the test + build gate as defense-in-depth, then
  # publishes with --provenance for supply-chain attestation via OIDC.
  # ============================================================================
  publish-npm:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC for `npm publish --provenance`
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release Summary
        run: |
          echo "## npm release published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.release-please.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.release-please.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Install:** \`npm install transcodely@${{ needs.release-please.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **npm:** https://www.npmjs.com/package/transcodely/v/${{ needs.release-please.outputs.version }}" >> $GITHUB_STEP_SUMMARY
